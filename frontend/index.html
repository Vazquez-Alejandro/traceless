<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b82f6" />
    <link rel="manifest" href="/manifest.json" />

    <title>TraceLess — Facturación Electrónica para Monotributistas Argentinos</title>
    <meta name="description" content="Emití facturas con validez ARCA, envialas por WhatsApp al instante y recibí pagos con MercadoPago. La app más simple para freelancers y monotributistas argentinos." />
    <meta name="keywords" content="facturación electrónica, ARCA, AFIP, monotributo, freelancers, Argentina, WhatsApp, MercadoPago, facturas, comprobantes" />
    <meta name="author" content="TraceLess" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.traceless.com.ar" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.traceless.com.ar" />
    <meta property="og:title" content="TraceLess — Facturación Electrónica para Monotributistas" />
    <meta property="og:description" content="Emití facturas con validez ARCA, envialas por WhatsApp al instante y recibí pagos con MercadoPago." />
    <meta property="og:image" content="https://www.traceless.com.ar/og-image.svg" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:site_name" content="TraceLess" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TraceLess — Facturación Electrónica para Monotributistas" />
    <meta name="twitter:description" content="Emití facturas con validez ARCA, envialas por WhatsApp al instante y recibí pagos con MercadoPago." />
    <meta name="twitter:image" content="https://www.traceless.com.ar/og-image.svg" />

    <!-- Google Search Console -->
    <meta name="google-site-verification" content="nw0eqzNtPcrhHHsglThZSM0pGU0SZkcifdu3BNQ_B2c" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TraceLess",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "App de facturación electrónica para monotributistas argentinos con integración ARCA, WhatsApp y MercadoPago.",
      "url": "https://www.traceless.com.ar",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "ARS",
          "name": "Plan Gratis"
        },
        {
          "@type": "Offer",
          "price": "15000",
          "priceCurrency": "ARS",
          "name": "Plan Profesional"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1"
      }
    }
    </script>
  </head>
  <body class="bg-gray-950 text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((reg) => console.log('SW registered:', reg.scope))
            .catch((err) => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
