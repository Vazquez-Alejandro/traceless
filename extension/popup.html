<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TraceLess</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      font-size: 14px;
    }
    .container { padding: 16px; }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo { font-size: 18px; }
    .title { font-weight: 700; color: #f59e0b; font-size: 16px; }
    .domain {
      padding: 12px;
      background: #18181b;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      color: #a1a1aa;
      word-break: break-all;
      margin-bottom: 12px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .safe { background: #14532d; color: #86efac; }
    .breached { background: #7f1d1d; color: #fca5a5; }
    .loading { background: #27272a; color: #a1a1aa; }
    .breach-name { font-weight: 600; margin-top: 8px; }
    .breach-item { font-size: 12px; padding: 8px; background: #27272a; border-radius: 6px; margin-top: 4px; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #d97706;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      text-align: center;
      text-decoration: none;
    }
    .btn:hover { background: #b45309; }
    .footer { text-align: center; font-size: 11px; color: #52525b; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">🛡️</span>
      <span class="title">TraceLess</span>
    </div>
    <div class="domain" id="domain">Cargando...</div>
    <div id="result"></div>
    <a class="btn" href="https://traceless.vercel.app" target="_blank">Abrir TraceLess</a>
    <div class="footer">Los datos no se comparten con terceros</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
